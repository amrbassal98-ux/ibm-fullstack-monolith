apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: myapp-daemonset
  labels:
    app: myapp
spec:
  selector:
    matchLabels:
      app: myapp
  template:
    metadata:
      labels:
        app: myapp
    spec:
      containers:
      - name: myapp-container
        image: myapp:v1
        imagePullPolicy: Never
        ports:
        - containerPort: 3000
          name: http
      tolerations:
      - key: Exists
        effect: NoSchedule
