{% extends 'base.html' %}
{% block title %}Add Customer | Customer360{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-dark text-white py-3">
                <h3 class="card-title mb-0 fw-bold">Register New Customer</h3>
            </div>
            <div class="card-body p-4 bg-white">
                <form method="post" novalidate>
                    {% csrf_token %}
                    
                    {% for field in form %}
                        <div class="mb-3 text-start">
                            <label class="form-label fw-bold text-secondary">{{ field.label }}</label>
                            {{ field }}
                            {% if field.errors %}
                                <div class="text-danger small mt-1">{{ field.errors|striptags }}</div>
                            {% endif %}
                        </div>
                    {% endfor %}
                    
                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-success btn-lg fw-bold">Commit Customer Record</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
