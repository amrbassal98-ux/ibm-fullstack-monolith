openapi: 3.0.0
info:
  title: Flask Item API
  description: A simple API to manage a list of items.
  version: 1.0.0
servers:
  - url: http://localhost:5000
    description: Local development server
paths:
  /:
    get:
      summary: Root endpoint
      responses:
        '200':
          description: A simple hello world message
          content:
            text/plain:
              schema:
                type: string
                example: Hello, World!
  /items:
    get:
      summary: Get all items
      responses:
        '200':
          description: A list of items
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
    post:
      summary: Add a new item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                item:
                  type: string
              required:
                - item
      responses:
        '201':
          description: Item added successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          description: No item provided
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /items/{index}:
    parameters:
      - name: index
        in: path
        required: true
        schema:
          type: integer
        description: The index of the item to manipulate
    put:
      summary: Update an existing item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                item:
                  type: string
      responses:
        '200':
          description: Item updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '404':
          description: Index out of range
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Delete an item
      responses:
        '200':
          description: Item deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '404':
          description: Index out of range
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    SuccessResponse:
      type: object
      properties:
        message:
          type: string
        data:
          type: string
    ErrorResponse:
      type: object
      properties:
        error:
          type: string