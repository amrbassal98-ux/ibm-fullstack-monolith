<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add New Product - StoreAPI</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="style.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
      <a class="navbar-brand" href="/">StoreAPI</a>
      <a href="/" class="btn btn-outline-secondary btn-sm">&larr; Back to Catalog</a>
    </div>
  </nav>

  <div class="container my-5" style="max-width: 650px;">
    <div class="card custom-card p-4 p-md-5">
      <h1 class="h2 text-white mb-4">Add New Product</h1>
      
      <div id="alertContainer"></div>

      <form id="createProductForm" class="needs-validation" novalidate>
        <div class="mb-3">
          <label for="name" class="form-label">Product Name</label>
          <input type="text" class="form-control" id="name" placeholder="e.g. Mechanical Keyboard" required>
          <div class="invalid-feedback">Please enter a valid product name.</div>
        </div>

        <div class="row">
          <div class="col-md-6 mb-3">
            <label for="price" class="form-label">Price ($)</label>
            <input type="number" class="form-control" id="price" placeholder="0.00" step="0.01" min="0" required>
            <div class="invalid-feedback">Price must be 0 or greater.</div>
          </div>
          
          <div class="col-md-6 mb-3">
            <label for="stock" class="form-label">Initial Stock</label>
            <input type="number" class="form-control" id="stock" placeholder="0" min="0" required>
            <div class="invalid-feedback">Stock must be a non-negative integer.</div>
          </div>
        </div>

        <div class="mb-4">
          <label for="category" class="form-label">Category</label>
          <select class="form-select" id="category" required>
            <option value="" disabled selected>Select a category</option>
            <option value="Electronics">Electronics</option>
            <option value="Furniture">Furniture</option>
            <option value="Accessories">Accessories</option>
          </select>
          <div class="invalid-feedback">Please choose a category.</div>
        </div>

        <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
          <a href="/" class="btn btn-outline-secondary px-4">Cancel</a>
          <button type="submit" class="btn btn-primary px-4" id="submitBtn">
            <span class="spinner-border spinner-border-sm d-none" id="btnSpinner" role="status" aria-hidden="true"></span>
            Add Product
          </button>
        </div>
      </form>
    </div>
  </div>

  <footer class="text-center">
    <div class="container">
      <p class="mb-0">&copy; 2026 StoreAPI. Built with Express.js & Bootstrap.</p>
    </div>
  </footer>

  <script>
    const form = document.getElementById('createProductForm');
    const submitBtn = document.getElementById('submitBtn');
    const btnSpinner = document.getElementById('btnSpinner');
    const alertContainer = document.getElementById('alertContainer');

    function showAlert(message, type = 'danger') {
      alertContainer.innerHTML = `
        <div class="alert alert-${type} alert-dismissible fade show bg-opacity-10 text-${type} border-${type}" role="alert">
          <strong>${type === 'danger' ? 'Error!' : 'Success!'}</strong> ${message}
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
      `;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      // Perform client side bootstrap validations
      if (!form.checkValidity()) {
        e.stopPropagation();
        form.classList.add('was-validated');
        return;
      }

      form.classList.add('was-validated');
      
      // Disable button and show spinner
      submitBtn.disabled = true;
      btnSpinner.classList.remove('d-none');

      const name = document.getElementById('name').value;
      const price = parseFloat(document.getElementById('price').value);
      const stock = parseInt(document.getElementById('stock').value, 10);
      const category = document.getElementById('category').value;

      try {
        const response = await fetch('/api/products', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ name, price, category, stock })
        });

        const data = await response.json();

        if (response.ok) {
          showAlert('Product added successfully! Redirecting...', 'success');
          setTimeout(() => {
            window.location.href = '/';
          }, 1500);
        } else {
          showAlert(data.error?.message || 'Failed to create product');
          submitBtn.disabled = false;
          btnSpinner.classList.add('d-none');
        }
      } catch (err) {
        console.error('Request failed:', err);
        showAlert('Network error occurred. Please try again.');
        submitBtn.disabled = false;
        btnSpinner.classList.add('d-none');
      }
    });
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
